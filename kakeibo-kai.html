<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプル家計簿</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { padding: 15px; border: 1px solid #ddd; border-radius: 6px; background: #fafafa; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"], input[type="date"], select, input[type="file"] {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        button { background-color: #3498db; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-success { background-color: #2ecc71; }
        .btn-success:hover { background-color: #27ae60; }
        .btn-warning { background-color: #f39c12; }
        .btn-warning:hover { background-color: #d68910; }
        .btn-secondary { background-color: #95a5a6; margin-left: 10px; }
        .btn-secondary:hover { background-color: #7f8c8d; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        .sample-csv { background: #eee; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 14px; white-space: pre-wrap; }
        .loading-notice { color: #e67e22; font-weight: bold; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>シンプル家計簿</h1>
    <div id="loading-msg" class="loading-notice">データを同期中...</div>

    <div class="grid-2">
        <div class="card">
            <h2 id="form-title">データ入力</h2>
            <form id="kakeibo-form">
                <div class="form-group">
                    <label for="date">日付</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="store">店名（選択または新規入力）</label>
                    <input type="text" id="store" list="store-list" placeholder="スーパーA" required>
                    <datalist id="store-list"></datalist>
                </div>
                <div class="form-group">
                    <label for="amount">金額（円）</label>
                    <input type="number" id="amount" min="0" required>
                </div>
                <div class="form-group">
                    <label for="method">支払い方法（選択または新規入力）</label>
                    <input type="text" id="method" list="method-list" placeholder="現金" required>
                    <datalist id="method-list"></datalist>
                </div>
                <div style="display: flex;">
                    <button type="submit" id="submit-btn">登録する</button>
                    <button type="button" id="cancel-btn" class="btn-secondary" style="display: none;" onclick="cancelEdit()">キャンセル</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h2>日別支払い推移（支払い方法別）</h2>
            <canvas id="monthlyChart"></canvas>
        </div>
    </div>

    <div class="card" style="margin-bottom: 20px;">
        <h2>データ管理 (CSV)</h2>
        <div style="display: flex; gap: 20px; align-items: flex-start;">
            <div>
                <h3>ダウンロード</h3>
                <button class="btn-success" onclick="downloadCSV()">CSVでダウンロード</button>
            </div>
            <div>
                <h3>インポート</h3>
                <input type="file" id="csv-file" accept=".csv" style="margin-bottom: 10px;">
                <button onclick="importCSV()">CSVを読み込む</button>
                <div style="margin-top: 10px;">
                    <strong>※CSVの書式サンプル:</strong>
                    <div class="sample-csv">日付,店名,金額,支払い方法
2026-05-31,スーパーA,1500,楽天カード
2026-06-01,コンビニB,800,PayPay</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>履歴一覧</h2>
        <button class="btn-danger" onclick="clearData()" style="float: right; margin-bottom: 10px;">全データ削除</button>
        <table>
            <thead>
                <tr>
                    <th>日付</th>
                    <th>店名</th>
                    <th>金額</th>
                    <th>支払い方法</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="data-table-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // 【重要】作成したGASの「ウェブアプリURL」をここに貼り付けてください
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw2TPBhSMeQlYaNcoNVBs4af6X9vFwv5Owan2vSvBnV9y7i1f9WLdUtyDo3owo0euOI/exec";

    // 状態管理
    let expenses = [];
    let chartInstance = null;
    let editingId = null;
    
    const defaultMethods = ["現金", "楽天カード", "PayPay", "楽天Pay", "WAON"];

    // 初期化
    document.addEventListener('DOMContentLoaded', async () => {
        setDefaultDate();
        await loadData();
    });

    // タイムゾーンによる日付のズレを防ぐ処理
    function setDefaultDate() {
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        document.getElementById('date').value = `${yyyy}-${mm}-${dd}`;
    }

    // データの読み込み
    async function loadData() {
        showLoading(true);
        if (!WEB_APP_URL || WEB_APP_URL.includes("YOUR_GAS_WEB_APP")) {
            expenses = JSON.parse(localStorage.getItem('kakeibo_data')) || [];
            updateUI();
            showLoading(false);
            return;
        }
        try {
            const response = await fetch(WEB_APP_URL);
            expenses = await response.json();
            updateUI();
        } catch (error) {
            console.error("データ同期失敗:", error);
            expenses = JSON.parse(localStorage.getItem('kakeibo_data')) || [];
            updateUI();
        } finally {
            showLoading(false);
        }
    }

    // フォーム送信処理
    document.getElementById('kakeibo-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const date = document.getElementById('date').value;
        const store = document.getElementById('store').value;
        const amount = parseInt(document.getElementById('amount').value, 10);
        const method = document.getElementById('method').value;

        const payload = { date, store, amount, method };

        if (editingId) {
            payload.action = 'update';
            payload.id = editingId;
            resetFormState();
        } else {
            payload.action = 'insert';
            payload.id = Date.now();
        }
        
        await syncWithServer(payload);
        this.reset();
        setDefaultDate();
    });

    // サーバーまたはローカルへの書き込み処理
    async function syncWithServer(payload) {
        showLoading(true);
        if (!WEB_APP_URL || WEB_APP_URL.includes("YOUR_GAS_WEB_APP")) {
            if (payload.action === 'update') {
                const index = expenses.findIndex(exp => exp.id === payload.id);
                if (index !== -1) expenses[index] = payload;
            } else if (payload.action === 'delete') {
                expenses = expenses.filter(e => e.id !== payload.id);
            } else if (payload.action === 'clear') {
                expenses = [];
            } else if (payload.action === 'insert') {
                expenses.push(payload);
            } else if (payload.action === 'bulk_insert') {
                expenses = expenses.concat(payload.data);
            }
            saveLocalData();
            updateUI();
            showLoading(false);
            return;
        }

        try {
            // 【変更点】CORSエラーを回避するため、ヘッダーとリダイレクトの指定を追加
            await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain', // preflightリクエストを回避
                },
                body: JSON.stringify(payload),
                redirect: 'follow' // GASの自動リダイレクトを許可
            });
            await loadData(); // 成功したら最新データを読み込み直す
        } catch (error) {
            alert("サーバーへの送信に失敗しました。通信環境を確認し再度お試しください。");
            console.error(error);
            showLoading(false);
        }
    }

    function saveLocalData() {
        expenses.sort((a, b) => new Date(b.date) - new Date(a.date));
        localStorage.setItem('kakeibo_data', JSON.stringify(expenses));
    }

    function updateUI() {
        expenses.sort((a, b) => new Date(b.date) - new Date(a.date));
        renderTable();
        updateStoreDatalist();
        updateMethodDatalist();
        renderChart();
    }

    function showLoading(isLoading) {
        document.getElementById('loading-msg').style.display = isLoading ? "block" : "none";
    }

    function updateStoreDatalist() {
        const datalist = document.getElementById('store-list');
        datalist.innerHTML = '';
        const uniqueStores = [...new Set(expenses.map(e => e.store))];
        uniqueStores.forEach(store => {
            const option = document.createElement('option');
            option.value = store;
            datalist.appendChild(option);
        });
    }

    function updateMethodDatalist() {
        const datalist = document.getElementById('method-list');
        datalist.innerHTML = '';
        const currentMethods = expenses.map(e => e.method);
        const uniqueMethods = [...new Set([...defaultMethods, ...currentMethods])];
        uniqueMethods.forEach(method => {
            const option = document.createElement('option');
            option.value = method;
            datalist.appendChild(option);
        });
    }

    function editEntry(id) {
        const exp = expenses.find(e => e.id === id);
        if (!exp) return;

        document.getElementById('date').value = exp.date;
        document.getElementById('store').value = exp.store;
        document.getElementById('amount').value = exp.amount;
        document.getElementById('method').value = exp.method;

        editingId = id;
        document.getElementById('form-title').innerText = "データ編集";
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.innerText = "更新する";
        submitBtn.className = "btn-warning";
        document.getElementById('cancel-btn').style.display = "inline-block";

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEdit() {
        document.getElementById('kakeibo-form').reset();
        setDefaultDate();
        resetFormState();
    }

    function resetFormState() {
        editingId = null;
        document.getElementById('form-title').innerText = "データ入力";
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.innerText = "登録する";
        submitBtn.className = "";
        document.getElementById('cancel-btn').style.display = "none";
    }

    function renderTable() {
        const tbody = document.getElementById('data-table-body');
        tbody.innerHTML = '';
        expenses.forEach(exp => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${exp.date}</td>
                <td>${exp.store}</td>
                <td>${exp.amount.toLocaleString()}円</td>
                <td>${exp.method}</td>
                <td>
                    <button onclick="editEntry(${exp.id})" class="btn-warning" style="padding: 3px 8px; font-size: 12px; margin-right: 5px;">編集</button>
                    <button onclick="deleteEntry(${exp.id})" style="padding: 3px 8px; font-size: 12px; background: #e74c3c;">削除</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function deleteEntry(id) {
        if(confirm('この記録を削除しますか？')) {
            if (editingId === id) resetFormState();
            await syncWithServer({ action: 'delete', id: id });
        }
    }

    async function clearData() {
        if(confirm('すべてのデータを削除しますか？この操作は元に戻せません。')) {
            resetFormState();
            await syncWithServer({ action: 'clear' });
        }
    }

    function renderChart() {
        const ctx = document.getElementById('monthlyChart').getContext('2d');
        const dailyData = {};
        const dynamicPaymentMethods = new Set();

        expenses.forEach(exp => {
            const date = exp.date;
            dynamicPaymentMethods.add(exp.method);

            if (!dailyData[date]) dailyData[date] = {};
            if (!dailyData[date][exp.method]) dailyData[date][exp.method] = 0;
            dailyData[date][exp.method] += exp.amount;
        });

        const sortedDates = Object.keys(dailyData).sort();
        const methodsArray = [...dynamicPaymentMethods];
        const colors = ['#f1c40f', '#e74c3c', '#3498db', '#e67e22', '#2ecc71', '#9b59b6', '#1abc9c', '#34495e', '#7f8c8d'];
        
        const datasets = methodsArray.map((method, index) => {
            return {
                label: method,
                data: sortedDates.map(date => dailyData[date][method] || 0),
                backgroundColor: colors[index % colors.length]
            };
        });

        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: { labels: sortedDates, datasets: datasets },
            options: {
                responsive: true,
                scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } }
            }
        });
    }

    function downloadCSV() {
        if (expenses.length === 0) {
            alert("ダウンロードするデータがありません。");
            return;
        }
        let csvContent = "日付,店名,金額,支払い方法\n";
        expenses.forEach(e => {
            csvContent += `${e.date},${e.store},${e.amount},${e.method}\n`;
        });

        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `kakeibo_${new Date().toISOString().slice(0,10)}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    async function importCSV() {
        const fileInput = document.getElementById('csv-file');
        const file = fileInput.files[0];
        if (!file) {
            alert("CSVファイルを選択してください。");
            return;
        }

        const reader = new FileReader();
        reader.onload = async function(e) {
            const text = e.target.result;
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
            const newExpenses = [];
            
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (cols.length >= 4) {
                    newExpenses.push({
                        id: Date.now() + i,
                        date: cols[0].trim(),
                        store: cols[1].trim(),
                        amount: parseInt(cols[2].trim(), 10) || 0,
                        method: cols[3].trim()
                    });
                }
            }

            if (newExpenses.length > 0) {
                await syncWithServer({ action: 'bulk_insert', data: newExpenses });
                alert("CSVの読み込み（インポート）が完了しました。");
            } else {
                alert("読み込めるデータが見つかりませんでした。CSVの書式を確認してください。");
            }
            fileInput.value = "";
        };
        reader.readAsText(file);
    }
</script>
</body>
</html>
