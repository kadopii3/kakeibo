<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプル家計簿</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; margin-top: 0; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { padding: 15px; border: 1px solid #ddd; border-radius: 6px; background: #fafafa; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #3498db; color: white; padding: 10px; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .summary-list { max-height: 200px; overflow-y: auto; padding-left: 20px; margin: 0; }
        .summary-list li { margin-bottom: 5px; }
        .table-responsive { overflow-x: auto; }
        /* タイトルと月選択を並べるためのスタイル */
        .header-flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-flex">
        <h1 style="margin: 0;">シンプル家計簿</h1>
        <div>
            <label for="month-filter" style="font-weight: bold; color: #2c3e50;">表示月：</label>
            <select id="month-filter" style="padding: 5px; font-size: 16px; min-width: 150px; border: 1px solid #ccc; border-radius: 4px;"></select>
        </div>
    </div>
    <div id="loading-msg" style="color:orange; display:none; margin-bottom: 15px;">通信中...</div>
    
    <div class="grid-2">
        <div class="card">
            <h2>データ入力</h2>
            <form id="kakeibo-form">
                <div class="form-group"><label>日付</label><input type="date" id="date" required></div>
                <div class="form-group"><label>店名・用途</label><input type="text" id="store" list="store-list" required></div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group"><label>金額（円）</label><input type="number" id="amount" required></div>
                    <div class="form-group"><label>たばこ（円・任意）</label><input type="number" id="tobacco" value="0" min="0"></div>
                    <div class="form-group"><label>医療費（円・任意）</label><input type="number" id="hospital" value="0" min="0"></div>
                    <div class="form-group"><label>薬代（円・任意）</label><input type="number" id="medicine" value="0" min="0"></div>
                </div>
                
                <div class="form-group" style="margin-top: 10px;"><label>交通費等（医療用・任意）</label><input type="number" id="transport" value="0" min="0"></div>
                <div class="form-group"><label>医療費備考（任意）</label><input type="text" id="medical_note" list="medical-note-list" placeholder="例：長男 内科、洋子 歯科 など"></div>

                <div class="form-group"><label>支払い</label><input type="text" id="method" list="method-list" required></div>
                <button type="submit" style="width: 100%;">登録する</button>
            </form>
            <datalist id="store-list"></datalist>
            <datalist id="method-list"></datalist>
            <datalist id="medical-note-list"></datalist>
        </div>
        <div class="card">
            <h2>日別・支払い方法別積み上げ</h2>
            <div><canvas id="monthlyChart"></canvas></div>
        </div>
    </div>

    <div id="summary-section" style="margin-top: 20px;"></div>

    <div style="margin-top:20px;">
        <input type="file" id="csv-file" accept=".csv"><button onclick="importCSV()">CSVインポート</button>
        <button onclick="downloadCSV()" style="margin-left: 10px; background-color: #2ecc71;">CSVエクスポート</button>
        <button onclick="clearData()" style="background:#e74c3c; margin-left: 10px;">全削除</button>
    </div>
    
    <div class="table-responsive">
        <table id="data-table">
            <thead><tr><th>日付</th><th>店名</th><th>金額</th><th>たばこ</th><th>医療費</th><th>薬代</th><th>交通費等</th><th>医療費備考</th><th>支払い</th><th>操作</th></tr></thead>
            <tbody id="data-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    // 【重要】GAS側で「新しいデプロイ」を行った後、ここに新しいURLを貼り付けてください
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzJdLsqCnZ-jZ7_RD_Y98VO6h1DFv3_o_Dwrd2CDwrfvM6GlPj-luDXFI3O1toNGMQ/exec";
    let expenses = [];
    let chartInstance = null;

    function getSafeMethod(methodValue) {
        if (methodValue === null || methodValue === undefined) return '未設定';
        const str = String(methodValue).trim();
        if (str === '' || str === 'undefined' || str === 'null') return '未設定';
        return str;
    }

    document.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('date').valueAsDate = new Date();
        // 月変更時に表示を更新するイベントを追加
        document.getElementById('month-filter').addEventListener('change', renderFilteredUI);
        await loadData();
    });

    async function loadData() {
        showLoading(true);
        try {
            const res = await fetch(WEB_APP_URL);
            expenses = await res.json();
            
            expenses.forEach(e => {
                let d = new Date(e.date);
                if (!isNaN(d.getTime())) {
                    e.date = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                }
            });
            
            updateUI();
        } catch (e) {
            console.error(e);
        } finally {
            showLoading(false);
        }
    }

    async function syncWithServer(payload) {
        showLoading(true);
        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify(payload)
            });
            setTimeout(loadData, 1000);
        } catch (e) {
            console.error(e);
            showLoading(false);
        }
    }

    function updateUI() {
        expenses.sort((a,b) => new Date(b.date) - new Date(a.date));
        
        // 月のプルダウンを生成
        const months = [...new Set(expenses.map(e => e.date ? e.date.substring(0, 7) : ''))].filter(m => m).sort().reverse();
        const filterEl = document.getElementById('month-filter');
        const prevValue = filterEl.value;
        
        let optionsHtml = '<option value="ALL">すべて表示</option>';
        months.forEach(m => {
            const [y, mm] = m.split('-');
            optionsHtml += `<option value="${m}">${y}年${mm}月</option>`;
        });
        filterEl.innerHTML = optionsHtml;

        // デフォルトの選択状態を設定（最新月優先）
        if (prevValue && (prevValue === 'ALL' || months.includes(prevValue))) {
            filterEl.value = prevValue;
        } else if (months.length > 0) {
            filterEl.value = months[0];
        }

        updateDatalists(); // プルダウン候補は全期間から生成
        renderFilteredUI(); // 選択された月でUIを描画
    }

    // 選択された月でテーブル・集計・グラフを描画する関数
    function renderFilteredUI() {
        const filterEl = document.getElementById('month-filter');
        const targetMonth = filterEl.value;
        
        let targetExpenses = expenses;
        if (targetMonth && targetMonth !== 'ALL') {
            targetExpenses = expenses.filter(e => e.date && e.date.startsWith(targetMonth));
        }

        const tbody = document.getElementById('data-table-body');
        tbody.innerHTML = targetExpenses.map(e => `<tr>
            <td>${e.date}</td>
            <td>${e.store}</td>
            <td>${e.amount}</td>
            <td>${e.tobacco || 0}</td>
            <td>${e.hospital || 0}</td>
            <td>${e.medicine || 0}</td>
            <td>${e.transport || 0}</td>
            <td>${e.medical_note || ''}</td>
            <td>${getSafeMethod(e.method)}</td>
            <td><button onclick="deleteEntry('${e.id}')">削除</button></td>
        </tr>`).join('');
        
        renderSummary(targetExpenses);
        renderChart(targetExpenses);
    }

    function updateDatalists() {
        const stores = [...new Set(expenses.map(e => e.store))];
        document.getElementById('store-list').innerHTML = stores.map(s => `<option value="${s}">`).join('');
        
        const rawMethods = expenses.map(e => getSafeMethod(e.method));
        const methods = [...new Set(rawMethods)];
        document.getElementById('method-list').innerHTML = methods.map(m => `<option value="${m}">`).join('');

        const rawNotes = expenses.map(e => e.medical_note).filter(n => n && String(n).trim() !== '');
        const notes = [...new Set(rawNotes)];
        document.getElementById('medical-note-list').innerHTML = notes.map(n => `<option value="${n}">`).join('');
    }

    function renderSummary(targetExpenses) {
        const daily = {};
        const monthly = {};
        const monthlyTotal = {};
        const monthlyTobacco = {};
        const monthlyMedical = {};

        targetExpenses.forEach(e => {
            const amount = Number(e.amount) || 0;
            const tobacco = Number(e.tobacco) || 0;
            const hospital = Number(e.hospital) || 0;
            const medicine = Number(e.medicine) || 0;
            const transport = Number(e.transport) || 0;
            
            const total = amount + tobacco + hospital + medicine + transport;
            const medicalTotal = hospital + medicine + transport;

            const date = e.date;
            if(!date) return;
            const month = date.substring(0, 7);
            const method = getSafeMethod(e.method);

            if (!daily[date]) daily[date] = 0;
            daily[date] += total;

            if (!monthly[month]) {
                monthly[month] = {};
                monthlyTotal[month] = 0;
                monthlyTobacco[month] = 0;
                monthlyMedical[month] = 0;
            }
            if (!monthly[month][method]) monthly[month][method] = 0;
            monthly[month][method] += total;
            monthlyTotal[month] += total;
            monthlyTobacco[month] += tobacco;
            monthlyMedical[month] += medicalTotal;
        });

        let html = '<div class="grid-2">';
        html += '<div class="card">';
        html += '<h2>各日の合計金額</h2><ul class="summary-list">';
        Object.keys(daily).sort().reverse().forEach(d => {
            html += `<li>${d}: <strong>${daily[d].toLocaleString()}円</strong></li>`;
        });
        html += '</ul></div>';

        html += '<div class="card">';
        html += '<h2>月別の支払い別合計</h2><ul class="summary-list">';
        Object.keys(monthly).sort().reverse().forEach(m => {
            html += `<li style="margin-bottom:15px; border-bottom:1px dashed #ccc; padding-bottom:5px;">`;
            html += `<strong>${m} (合計: ${monthlyTotal[m].toLocaleString()}円)</strong><br>`;
            html += `<span style="font-size: 0.9em; color: #555;">内たばこ代: ${monthlyTobacco[m].toLocaleString()}円 / <strong>内医療費控除対象: ${monthlyMedical[m].toLocaleString()}円</strong></span><ul>`;
            Object.keys(monthly[m]).forEach(method => {
                html += `<li>${method}: ${monthly[m][method].toLocaleString()}円</li>`;
            });
            html += '</ul></li>';
        });
        html += '</ul></div></div>';

        document.getElementById('summary-section').innerHTML = html;
    }

    function renderChart(targetExpenses) {
        const ctx = document.getElementById('monthlyChart').getContext('2d');
        const labels = [...new Set(targetExpenses.map(e => e.date))].sort();
        
        const rawMethods = targetExpenses.map(e => getSafeMethod(e.method));
        const methods = [...new Set(rawMethods)];
        const colors = ['#3498db', '#e67e22', '#2ecc71', '#f1c40f', '#9b59b6', '#e74c3c', '#1abc9c'];
        
        const datasets = methods.map((m, i) => ({
            label: m,
            data: labels.map(date => targetExpenses.filter(e => {
                const em = getSafeMethod(e.method);
                return e.date === date && em === m;
            }).reduce((sum, e) => sum + (Number(e.amount)||0) + (Number(e.tobacco)||0) + (Number(e.hospital)||0) + (Number(e.medicine)||0) + (Number(e.transport)||0), 0)),
            backgroundColor: colors[i % colors.length]
        }));

        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: { labels: labels, datasets: datasets },
            options: { 
                scales: { 
                    x: { stacked: true }, 
                    y: { stacked: true, beginAtZero: true } 
                } 
            }
        });
    }

    document.getElementById('kakeibo-form').onsubmit = async (e) => {
        e.preventDefault();
        await syncWithServer({
            action: 'insert',
            id: Date.now(),
            date: document.getElementById('date').value,
            store: document.getElementById('store').value,
            amount: document.getElementById('amount').value,
            tobacco: document.getElementById('tobacco').value,
            hospital: document.getElementById('hospital').value,
            medicine: document.getElementById('medicine').value,
            transport: document.getElementById('transport').value,
            medical_note: document.getElementById('medical_note').value,
            method: document.getElementById('method').value
        });
    };

    async function deleteEntry(id) { 
        if(confirm('この履歴を削除しますか？')) {
            expenses = expenses.filter(e => String(e.id) !== String(id));
            updateUI();
            await syncWithServer({action: 'delete', id: id}); 
        }
    }
    
    async function clearData() { if(confirm('全削除しますか？')) await syncWithServer({action: 'clear'}); }

    async function importCSV() {
        const file = document.getElementById('csv-file').files[0];
        if(!file) return alert("ファイルを選択してください");
        const text = await file.text();
        const data = text.split(/\r?\n/).slice(1).filter(l=>l).map(l => {
            const c = l.split(',');
            return {
                id: Date.now()+Math.random(), 
                date: c[0], 
                store: c[1], 
                amount: c[2], 
                tobacco: c[3], 
                hospital: c[4], 
                medicine: c[5], 
                transport: c[6], 
                method: getSafeMethod(c[7]),
                medical_note: c[8] || ''
            };
        });
        await syncWithServer({action: 'bulk_insert', data: data});
    }

    function downloadCSV() {
        if (expenses.length === 0) {
            alert("ダウンロードするデータがありません。");
            return;
        }
        let csvContent = "日付,店名,金額,たばこ,医療費,薬代,交通費等,支払い方法,医療費備考\n";
        expenses.forEach(e => {
            csvContent += `${e.date},${e.store},${e.amount},${e.tobacco || 0},${e.hospital || 0},${e.medicine || 0},${e.transport || 0},${getSafeMethod(e.method)},${e.medical_note || ''}\n`;
        });
        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", `kakeibo_${new Date().toISOString().slice(0,10)}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function showLoading(s) { document.getElementById('loading-msg').style.display = s ? "block" : "none"; }
</script>
</body>
</html>
