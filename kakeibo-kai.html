<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプル家計簿</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { padding: 15px; border: 1px solid #ddd; border-radius: 6px; background: #fafafa; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="number"], input[type="date"], select, input[type="file"] {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        button { background-color: #3498db; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; }
        .btn-success { background-color: #2ecc71; }
        .btn-warning { background-color: #f39c12; }
        .btn-secondary { background-color: #95a5a6; margin-left: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        .loading-notice { color: #e67e22; font-weight: bold; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>シンプル家計簿</h1>
    <div id="loading-msg" class="loading-notice">データを同期中...</div>

    <div class="grid-2">
        <div class="card">
            <h2 id="form-title">データ入力</h2>
            <form id="kakeibo-form">
                <div class="form-group">
                    <label for="date">日付</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="store">店名</label>
                    <input type="text" id="store" list="store-list" required>
                    <datalist id="store-list"></datalist>
                </div>
                <div class="form-group">
                    <label for="amount">金額（円）</label>
                    <input type="number" id="amount" min="0" required>
                </div>
                <div class="form-group">
                    <label for="method">支払い方法</label>
                    <input type="text" id="method" list="method-list" required>
                    <datalist id="method-list"></datalist>
                </div>
                <button type="submit" id="submit-btn">登録する</button>
            </form>
        </div>

        <div class="card">
            <h2>日別・支払い方法別積み上げ</h2>
            <canvas id="monthlyChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h2>履歴一覧</h2>
        <button class="btn-danger" onclick="clearData()" style="float: right;">全データ削除</button>
        <table>
            <thead>
                <tr>
                    <th>日付</th>
                    <th>店名</th>
                    <th>金額</th>
                    <th>支払い方法</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="data-table-body">
            </tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw2TPBhSMeQlYaNcoNVBs4af6X9vFwv5Owan2vSvBnV9y7i1f9WLdUtyDo3owo0euOI/exec";
    let expenses = [];
    let chartInstance = null;

    document.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('date').valueAsDate = new Date();
        await loadData();
    });

    async function loadData() {
        showLoading(true);
        try {
            const res = await fetch(WEB_APP_URL);
            expenses = await res.json();
            updateUI();
        } catch (e) { console.error(e); }
        finally { showLoading(false); }
    }

    async function syncWithServer(payload) {
        showLoading(true);
        await fetch(WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        });
        setTimeout(loadData, 1000);
    }

    function updateUI() {
        expenses.sort((a,b) => new Date(b.date) - new Date(a.date));
        const tbody = document.getElementById('data-table-body');
        tbody.innerHTML = expenses.map(e => `<tr><td>${e.date}</td><td>${e.store}</td><td>${e.amount}</td><td>${e.method}</td><td><button onclick="deleteEntry('${e.id}')">削除</button></td></tr>`).join('');
        
        const stores = [...new Set(expenses.map(e => e.store))];
        document.getElementById('store-list').innerHTML = stores.map(s => `<option value="${s}">`).join('');
        const methods = [...new Set(expenses.map(e => e.method))];
        document.getElementById('method-list').innerHTML = methods.map(m => `<option value="${m}">`).join('');
        
        renderChart(methods);
    }

    function renderChart(methods) {
        const ctx = document.getElementById('monthlyChart').getContext('2d');
        const labels = [...new Set(expenses.map(e => e.date))].sort();
        
        const datasets = methods.map((m, i) => ({
            label: m,
            data: labels.map(d => expenses.filter(e => e.date === d && e.method === m).reduce((sum, e) => sum + Number(e.amount), 0)),
            backgroundColor: ['#3498db', '#e67e22', '#2ecc71', '#f1c40f', '#9b59b6'][i % 5]
        }));
        
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: { labels: labels, datasets: datasets },
            options: { scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } } }
        });
    }

    document.getElementById('kakeibo-form').onsubmit = async (e) => {
        e.preventDefault();
        await syncWithServer({
            action: 'insert',
            id: Date.now(),
            date: document.getElementById('date').value,
            store: document.getElementById('store').value,
            amount: document.getElementById('amount').value,
            method: document.getElementById('method').value
        });
    };

    async function deleteEntry(id) { await syncWithServer({action: 'delete', id: id}); }
    async function clearData() { if(confirm('全削除しますか？')) await syncWithServer({action: 'clear'}); }
    function showLoading(s) { document.getElementById('loading-msg').style.display = s ? "block" : "none"; }
</script>
</body>
</html>
