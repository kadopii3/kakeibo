<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプル家計簿</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #3498db; color: white; padding: 10px; border: none; cursor: pointer; margin-right: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>
<div class="container">
    <h1>シンプル家計簿</h1>
    <div id="loading-msg" style="color:orange; display:none;">通信中...</div>
    <div class="grid-2">
        <div>
            <form id="kakeibo-form">
                <div class="form-group"><label>日付</label><input type="date" id="date" required></div>
                <div class="form-group"><label>店名</label><input type="text" id="store" list="store-list" required></div>
                <div class="form-group"><label>金額</label><input type="number" id="amount" required></div>
                <div class="form-group"><label>支払い</label><input type="text" id="method" list="method-list" required></div>
                <button type="submit">登録する</button>
            </form>
            <datalist id="store-list"></datalist><datalist id="method-list"></datalist>
        </div>
        <div><canvas id="monthlyChart"></canvas></div>
    </div>
    <div style="margin-top:20px;">
        <input type="file" id="csv-file" accept=".csv" style="width:auto;"><button onclick="importCSV()">CSVインポート</button>
        <button onclick="downloadCSV()" style="background:#2ecc71">CSVエクスポート</button>
        <button onclick="clearData()" style="background:#e74c3c">全削除</button>
    </div>
    <table id="data-table"><thead><tr><th>日付</th><th>店名</th><th>金額</th><th>支払い</th><th>操作</th></tr></thead><tbody id="data-table-body"></tbody></table>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw2TPBhSMeQlYaNcoNVBs4af6X9vFwv5Owan2vSvBnV9y7i1f9WLdUtyDo3owo0euOI/exec";
    let expenses = [];
    let chartInstance = null;

    document.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('date').valueAsDate = new Date();
        await loadData();
    });

    async function loadData() {
        showLoading(true);
        const res = await fetch(WEB_APP_URL);
        expenses = await res.json();
        updateUI();
        showLoading(false);
    }

    async function syncWithServer(payload) {
        showLoading(true);
        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            await loadData(); // 成功したら再読み込み
        } catch (e) {
            console.error(e);
            alert("送信エラー：もう一度お試しください。");
        } finally {
            showLoading(false);
        }
    }

    function updateUI() {
        expenses.sort((a,b) => new Date(b.date) - new Date(a.date));
        document.getElementById('data-table-body').innerHTML = expenses.map(e => `<tr><td>${e.date}</td><td>${e.store}</td><td>${e.amount}</td><td>${e.method}</td><td><button onclick="deleteEntry('${e.id}')">削除</button></td></tr>`).join('');
        
        const stores = [...new Set(expenses.map(e => e.store))];
        document.getElementById('store-list').innerHTML = stores.map(s => `<option value="${s}">`).join('');
        const methods = [...new Set(expenses.map(e => e.method))];
        document.getElementById('method-list').innerHTML = methods.map(m => `<option value="${m}">`).join('');
        
        renderChart(methods);
    }

    function renderChart(methods) {
        const ctx = document.getElementById('monthlyChart').getContext('2d');
        const dates = [...new Set(expenses.map(e => e.date))].sort();
        const datasets = methods.map((m, i) => ({
            label: m,
            data: dates.map(d => expenses.filter(e => e.date === d && e.method === m).reduce((sum, e) => sum + Number(e.amount), 0)),
            backgroundColor: ['#3498db', '#e67e22', '#2ecc71', '#f1c40f', '#9b59b6'][i % 5]
        }));
        
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: { labels: dates, datasets: datasets },
            options: { scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } } }
        });
    }

    document.getElementById('kakeibo-form').onsubmit = async (e) => {
        e.preventDefault();
        await syncWithServer({
            action: 'insert',
            id: Date.now(),
            date: document.getElementById('date').value,
            store: document.getElementById('store').value,
            amount: document.getElementById('amount').value,
            method: document.getElementById('method').value
        });
    };

    function downloadCSV() {
        const csv = "日付,店名,金額,支払い\n" + expenses.map(e => `${e.date},${e.store},${e.amount},${e.method}`).join("\n");
        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], {type: 'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'kakeibo.csv'; a.click();
    }

    async function deleteEntry(id) { await syncWithServer({action: 'delete', id: id}); }
    async function clearData() { if(confirm('全削除しますか？')) await syncWithServer({action: 'clear'}); }
    async function importCSV() {
        const file = document.getElementById('csv-file').files[0];
        const data = (await file.text()).split(/\r?\n/).slice(1).filter(l=>l).map(l => {
            const c = l.split(',');
            return {id: Date.now()+Math.random(), date:c[0], store:c[1], amount:c[2], method:c[3]};
        });
        await syncWithServer({action: 'bulk_insert', data: data});
    }
    function showLoading(s) { document.getElementById('loading-msg').style.display = s ? "block" : "none"; }
</script>
</body>
</html>
