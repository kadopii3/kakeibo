<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプル家計簿</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #3498db; color: white; padding: 10px; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>
<div class="container">
    <h1>シンプル家計簿</h1>
    <div id="loading-msg" style="color:orange; display:none;">通信中...</div>
    <div class="grid-2">
        <div class="card">
            <form id="kakeibo-form">
                <div class="form-group"><label>日付</label><input type="date" id="date" required></div>
                <div class="form-group"><label>店名</label><input type="text" id="store" list="store-list" required></div>
                <div class="form-group"><label>金額</label><input type="number" id="amount" required></div>
                <div class="form-group"><label>支払い</label><input type="text" id="method" list="method-list" required></div>
                <button type="submit">登録する</button>
            </form>
            <datalist id="store-list"></datalist><datalist id="method-list"></datalist>
        </div>
        <div><canvas id="monthlyChart"></canvas></div>
    </div>
    <div style="margin-top:20px;">
        <input type="file" id="csv-file" accept=".csv"><button onclick="importCSV()">CSVインポート</button>
        <button onclick="clearData()" style="background:#e74c3c">全削除</button>
    </div>
    <table id="data-table"><thead><tr><th>日付</th><th>店名</th><th>金額</th><th>支払い</th><th>操作</th></tr></thead><tbody id="data-table-body"></tbody></table>
</div>

<script>
    // 【重要】ここのURLを新しいURLに書き換えてください
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby7UgkAZouGliAeFo-8buqmCiMQ-Vddh8yzg4LYvwKheEYAdDlXO-EjHWttiK8Ku850/exec";
    let expenses = [];
    let chartInstance = null;

    document.addEventListener('DOMContentLoaded', async () => {
        document.getElementById('date').valueAsDate = new Date();
        await loadData();
    });

    async function loadData() {
        showLoading(true);
        try {
            const res = await fetch(WEB_APP_URL);
            expenses = await res.json();
            updateUI();
        } catch (e) {
            console.error(e);
        } finally {
            showLoading(false);
        }
    }

    async function syncWithServer(payload) {
        showLoading(true);
        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // ★この1行が絶対に必要です！
                body: JSON.stringify(payload)
            });
            // no-corsを使うと応答が取れないため、少し待ってから読み直すのがコツです
            setTimeout(loadData, 1000);
        } catch (e) {
            console.error(e);
            showLoading(false);
        }
    }

    function updateUI() {
        expenses.sort((a,b) => new Date(b.date) - new Date(a.date));
        const tbody = document.getElementById('data-table-body');
        tbody.innerHTML = expenses.map(e => `<tr><td>${e.date}</td><td>${e.store}</td><td>${e.amount}</td><td>${e.method}</td><td><button onclick="deleteEntry('${e.id}')">削除</button></td></tr>`).join('');
        updateDatalists();
        renderChart();
    }

    function updateDatalists() {
        const stores = [...new Set(expenses.map(e => e.store))];
        document.getElementById('store-list').innerHTML = stores.map(s => `<option value="${s}">`).join('');
    }

    function renderChart() {
        const ctx = document.getElementById('monthlyChart').getContext('2d');
        const labels = [...new Set(expenses.map(e => e.date))].sort();
        const data = labels.map(date => expenses.filter(e => e.date === date).reduce((sum, e) => sum + Number(e.amount), 0));
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: { labels: labels, datasets: [{ label: '日別合計', data: data, backgroundColor: '#3498db' }] },
            options: { scales: { y: { beginAtZero: true } } }
        });
    }

    document.getElementById('kakeibo-form').onsubmit = async (e) => {
        e.preventDefault();
        await syncWithServer({
            action: 'insert',
            id: Date.now(),
            date: document.getElementById('date').value,
            store: document.getElementById('store').value,
            amount: document.getElementById('amount').value,
            method: document.getElementById('method').value
        });
    };

    async function deleteEntry(id) { await syncWithServer({action: 'delete', id: id}); }
    async function clearData() { if(confirm('全削除しますか？')) await syncWithServer({action: 'clear'}); }

    async function importCSV() {
        const file = document.getElementById('csv-file').files[0];
        const text = await file.text();
        const data = text.split(/\r?\n/).slice(1).filter(l=>l).map(l => {
            const c = l.split(',');
            return {id: Date.now()+Math.random(), date:c[0], store:c[1], amount:c[2], method:c[3]};
        });
        await syncWithServer({action: 'bulk_insert', data: data});
    }

    function showLoading(s) { document.getElementById('loading-msg').style.display = s ? "block" : "none"; }
</script>
</body>
</html>
